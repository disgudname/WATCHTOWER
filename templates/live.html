<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WATCHTOWER — LIVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      color: #fff;
    }

    /* vignette — darkens edges of the road footage underneath */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, transparent 35%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── shared panel style ───────────────────────────────────── */
    .panel {
      position: absolute;
      background: rgba(6, 8, 14, 0.78);
      border: 1px solid rgba(240, 165, 0, 0.22);
      backdrop-filter: blur(8px);
    }

    /* ── WEATHER (inline in loc-bar) ────────────────────────── */
    #wx-icon {
      width: 52px;
      height: 52px;
      filter: brightness(1.1) saturate(0.9);
    }
    #wx-temp, #wx-desc {
      font-family: 'Share Tech Mono', monospace;
      font-size: 34px;
      font-weight: 400;
      letter-spacing: 2px;
      color: #fff;
      text-transform: uppercase;
    }
    .loc-divider {
      width: 1px;
      height: 32px;
      background: rgba(240,165,0,0.3);
    }

    /* ── MINI MAP  bottom-right ──────────────────────────────── */
    #map-wrap {
      bottom: 178px;
      right: 44px;
      width: 360px;
      height: 270px;
      overflow: hidden;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    /* hide Leaflet chrome on small map */
    #map .leaflet-control-container,
    #map .leaflet-attribution-flag { display: none !important; }

    /* ── LOCATION BAR  full-width bottom strip ────────────────── */
    #loc-bar {
      position: absolute;
      bottom: 72px; left: 0; right: 0;
      height: 90px;
      background: rgba(6, 8, 14, 0.88);
      border-top: 1px solid rgba(240,165,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      z-index: 10;
    }
    #loc-val {
      font-size: 36px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── STALE / SIGNAL LOST badge  top-left ─────────────────── */
    #stale-badge {
      bottom: 460px;
      right: 44px;
      padding: 9px 18px;
      background: rgba(180, 20, 20, 0.88);
      border: 1px solid rgba(220, 60, 60, 0.6);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;
      display: none;
      animation: stale-pulse 2.4s ease-in-out infinite;
    }
    #stale-badge.show { display: block; }

    @keyframes stale-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    /* ── STATE CROSSING BANNER ───────────────────────────────── */
    #state-banner {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      opacity: 0;
      transition: opacity 1s ease;
      z-index: 20;
    }
    #state-banner.show { opacity: 1; }
    #state-banner-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 22px;
      font-weight: 300;
      letter-spacing: 10px;
      color: #fff;
      text-transform: uppercase;
    }
    #state-banner-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 120px;
      font-weight: 800;
      letter-spacing: 16px;
      color: #fff;
      text-transform: uppercase;
      line-height: 1;
      text-shadow: 0 0 80px rgba(240,165,0,0.35);
    }

    /* ── TIPS BAR  full-width very bottom ───────────────────────── */
    #tips-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 72px;
      background: rgba(6, 8, 14, 0.92);
      border-top: 1px solid rgba(240,165,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 0 44px;
      z-index: 10;
    }
    #tips-tag {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 6px;
      color: #fff;
      text-transform: uppercase;
      flex-shrink: 0;
      background: #f0a500;
      display: inline-flex;
      align-items: center;
      padding: 7px 10px 7px 16px;
      height: 40px;
    }
    #tips-text {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 30px;
      font-weight: 600;
      font-style: italic;
      letter-spacing: 1px;
      color: #fff;
      transition: opacity 0.7s ease;
    }

    /* ── HIGHWAY BADGE ──────────────────────────────────────── */
    #highway-badge {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 3px;
      padding: 5px 14px;
      border-radius: 4px;
      text-transform: uppercase;
      display: none;
    }
    #highway-badge:not(:empty) { display: inline-block; }
    #highway-badge.hw-interstate {
      background: #003f87;
      color: #fff;
      border: 1px solid rgba(255,255,255,0.35);
    }
    #highway-badge.hw-us {
      background: #f0a500;
      color: #000;
      border: 1px solid rgba(0,0,0,0.2);
    }

    /* custom position marker */
    .live-dot {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: #f0a500;
      border: 3px solid #fff;
      box-shadow: 0 0 10px rgba(240,165,0,0.9);
    }
  </style>
</head>
<body>

  <!-- State crossing banner -->
  <div id="state-banner">
    <div id="state-banner-label">Now entering</div>
    <div id="state-banner-name"></div>
  </div>

  <!-- Mini map -->
  <div id="map-wrap" class="panel">
    <div id="map"></div>
  </div>

  <!-- Location bar -->
  <div id="loc-bar">
    <img id="wx-icon" src="https://openweathermap.org/img/wn/01d@2x.png" alt="">
    <span id="wx-temp">---°F</span>
    <div class="loc-divider"></div>
    <span id="highway-badge"></span>
    <span id="loc-val">---</span>
    <div class="loc-divider"></div>
    <span id="wx-desc">---</span>
  </div>

  <!-- Stale badge -->
  <div id="stale-badge" class="panel">&#9888; GPS SIGNAL LOST</div>

  <!-- Tips -->
  <div id="tips-bar">
    <span id="tips-tag">Tip</span>
    <span id="tips-text"></span>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Map setup ──────────────────────────────────────────────────────
    const map = L.map('map', {
      zoomControl: false, attributionControl: false,
      dragging: false, touchZoom: false, scrollWheelZoom: false,
      doubleClickZoom: false, boxZoom: false, keyboard: false,
    }).setView([39.5, -98.35], 11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19, subdomains: 'abcd',
    }).addTo(map);

    const routeLine = L.polyline([], {
      color: '#f0a500', weight: 2, opacity: 0.75,
    }).addTo(map);

    const posIcon = L.divIcon({
      className: '', html: '<div class="live-dot"></div>',
      iconSize: [22, 22], iconAnchor: [11, 11],
    });
    const posMarker = L.marker([39.5, -98.35], { icon: posIcon }).addTo(map);

    // ── State ──────────────────────────────────────────────────────────
    let lastLat = null, lastLon = null;
    let lastCrossingAt = null;

    function showStateBanner(name) {
      const el = document.getElementById('state-banner');
      document.getElementById('state-banner-name').textContent = name.toUpperCase();
      el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 9000);
    }

    // ── Render ─────────────────────────────────────────────────────────
    function render(d) {
      const stale = d.stale;

      // Weather
      if (d.weather_temp_f !== null) {
        document.getElementById('wx-temp').textContent = d.weather_temp_f + '°F';
        document.getElementById('wx-desc').textContent = d.weather_desc || '---';
        document.getElementById('wx-icon').src =
          'https://openweathermap.org/img/wn/' + (d.weather_icon || '01d') + '@2x.png';
      }

      // Location
      document.getElementById('loc-val').textContent =
        (d.city_state || '---').toUpperCase();

      // Highway badge
      const hwBadge = document.getElementById('highway-badge');
      if (d.highway) {
        hwBadge.textContent = d.highway;
        hwBadge.className = d.highway.startsWith('I-') ? 'hw-interstate' : 'hw-us';
        hwBadge.style.display = 'inline-block';
      } else {
        hwBadge.style.display = 'none';
      }

      // Stale badge
      document.getElementById('stale-badge').classList.toggle('show', !!stale);

      // State crossing banner
      const sc = d.state_crossing;
      if (sc && sc.at && sc.at !== lastCrossingAt) {
        const age = Date.now() / 1000 - sc.at;
        if (age < 15) {
          lastCrossingAt = sc.at;
          showStateBanner(sc.name);
        }
      }

      // Map — only pan when position actually changes
      if (d.lat && d.lon) {
        if (d.lat !== lastLat || d.lon !== lastLon) {
          posMarker.setLatLng([d.lat, d.lon]);
          map.panTo([d.lat, d.lon], { animate: true, duration: 1 });
          lastLat = d.lat; lastLon = d.lon;
        }
        // Show last 200 points on the mini-map to keep it readable
        if (d.route && d.route.length > 0) {
          const tail = d.route.slice(-200);
          routeLine.setLatLngs(tail);
        }
      }
    }

    // ── Poll ───────────────────────────────────────────────────────────
    async function poll() {
      try {
        const r = await fetch('/api/status');
        if (r.ok) render(await r.json());
      } catch (e) {
        console.warn('poll error', e);
        // show stale if server unreachable
        document.getElementById('stale-badge').classList.add('show');
      }
      setTimeout(poll, 5000);
    }

    poll();

    // ── Tips ───────────────────────────────────────────────────────────
    (async function initTips() {
      let tips = [];
      try {
        const r = await fetch('/api/tips');
        if (r.ok) tips = await r.json();
      } catch (e) { console.warn('tips fetch failed', e); }
      if (!tips.length) return;

      for (let i = tips.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [tips[i], tips[j]] = [tips[j], tips[i]];
      }
      let idx = 0;
      const el = document.getElementById('tips-text');
      el.textContent = tips[0];

      setInterval(() => {
        el.style.opacity = '0';
        setTimeout(() => {
          idx = (idx + 1) % tips.length;
          el.textContent = tips[idx];
          el.style.opacity = '1';
        }, 700);
      }, 30000);
    })();
  </script>
</body>
</html>
