<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>WATCHTOWER — LIVE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700&display=swap">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: 'Share Tech Mono', monospace;
      color: #fff;
    }

    /* vignette — darkens edges of the road footage underneath */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at 50% 60%, transparent 35%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── shared panel style ───────────────────────────────────── */
    .panel {
      position: absolute;
      background: rgba(6, 8, 14, 0.78);
      border: 1px solid rgba(240, 165, 0, 0.22);
      backdrop-filter: blur(8px);
    }

    /* ── SPEED BLOCK  bottom-left ─────────────────────────────── */
    #speed-block {
      left: 44px;
      bottom: 88px;
      padding: 18px 30px 14px 26px;
      min-width: 210px;
    }

    #speed-num {
      font-size: 136px;
      line-height: 1;
      letter-spacing: -6px;
      color: #fff;
      transition: color 0.4s;
    }
    #speed-num.stale { color: rgba(255,255,255,0.22); }

    #speed-meta {
      display: flex;
      align-items: center;
      gap: 0;
      margin-top: 2px;
    }
    #speed-unit {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 26px;
      font-weight: 300;
      letter-spacing: 5px;
      color: #f0a500;
      padding-right: 18px;
    }
    #heading-val {
      font-size: 26px;
      color: #e0e0e0;
      border-left: 1px solid rgba(240,165,0,0.35);
      padding-left: 18px;
      letter-spacing: 2px;
    }

    /* ── CLOCK BLOCK  top-right ───────────────────────────────── */
    #clock-block {
      top: 44px;
      right: 44px;
      padding: 14px 22px 12px 22px;
      text-align: right;
      min-width: 300px;
    }
    #clock-time {
      font-size: 58px;
      line-height: 1;
      letter-spacing: 2px;
    }
    #clock-tz {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 300;
      letter-spacing: 7px;
      color: #f0a500;
      text-transform: uppercase;
      margin-top: 5px;
    }

    /* ── WEATHER BLOCK  top-right, below clock ───────────────── */
    #weather-block {
      top: 182px;
      right: 44px;
      padding: 12px 18px 12px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 200px;
    }
    #wx-icon {
      width: 52px;
      height: 52px;
      flex-shrink: 0;
      filter: brightness(1.1) saturate(0.9);
    }
    #wx-right { display: flex; flex-direction: column; gap: 2px; }
    #wx-temp {
      font-size: 34px;
      line-height: 1;
      color: #fff;
    }
    #wx-desc {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 15px;
      font-weight: 300;
      letter-spacing: 3px;
      color: rgba(255,255,255,0.6);
      text-transform: uppercase;
    }

    /* ── MINI MAP  bottom-right ──────────────────────────────── */
    #map-wrap {
      bottom: 88px;
      right: 44px;
      width: 238px;
      height: 238px;
      overflow: hidden;
    }
    #map {
      width: 100%;
      height: 100%;
    }
    /* hide Leaflet chrome on small map */
    #map .leaflet-control-container,
    #map .leaflet-attribution-flag { display: none !important; }

    /* ── LOCATION BAR  full-width bottom strip ────────────────── */
    #loc-bar {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 72px;
      background: rgba(6, 8, 14, 0.88);
      border-top: 1px solid rgba(240,165,0,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
      z-index: 10;
    }
    #loc-label {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 13px;
      font-weight: 300;
      letter-spacing: 7px;
      color: #f0a500;
      text-transform: uppercase;
    }
    #loc-divider {
      width: 1px;
      height: 28px;
      background: rgba(240,165,0,0.3);
    }
    #loc-val {
      font-size: 28px;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    /* ── STALE / SIGNAL LOST badge  top-left ─────────────────── */
    #stale-badge {
      top: 44px;
      left: 44px;
      padding: 9px 18px;
      background: rgba(180, 20, 20, 0.88);
      border: 1px solid rgba(220, 60, 60, 0.6);
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 5px;
      color: #fff;
      text-transform: uppercase;
      display: none;
      animation: stale-pulse 2.4s ease-in-out infinite;
    }
    #stale-badge.show { display: block; }

    @keyframes stale-pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.45; }
    }

    /* custom position marker */
    .live-dot {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #f0a500;
      border: 2px solid #fff;
      box-shadow: 0 0 6px rgba(240,165,0,0.8);
    }
  </style>
</head>
<body>

  <!-- Speed -->
  <div id="speed-block" class="panel">
    <div id="speed-num">---</div>
    <div id="speed-meta">
      <span id="speed-unit">MPH</span>
      <span id="heading-val">---</span>
    </div>
  </div>

  <!-- Clock -->
  <div id="clock-block" class="panel">
    <div id="clock-time">--:-- --</div>
    <div id="clock-tz">---</div>
  </div>

  <!-- Weather -->
  <div id="weather-block" class="panel">
    <img id="wx-icon" src="https://openweathermap.org/img/wn/01d@2x.png" alt="">
    <div id="wx-right">
      <div id="wx-temp">---°F</div>
      <div id="wx-desc">---</div>
    </div>
  </div>

  <!-- Mini map -->
  <div id="map-wrap" class="panel">
    <div id="map"></div>
  </div>

  <!-- Location bar -->
  <div id="loc-bar">
    <span id="loc-label">Location</span>
    <div id="loc-divider"></div>
    <span id="loc-val">---</span>
  </div>

  <!-- Stale badge -->
  <div id="stale-badge" class="panel">&#9888; Signal Lost</div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // ── Map setup ──────────────────────────────────────────────────────
    const map = L.map('map', {
      zoomControl: false, attributionControl: false,
      dragging: false, touchZoom: false, scrollWheelZoom: false,
      doubleClickZoom: false, boxZoom: false, keyboard: false,
    }).setView([39.5, -98.35], 11);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      maxZoom: 19, subdomains: 'abcd',
    }).addTo(map);

    const routeLine = L.polyline([], {
      color: '#f0a500', weight: 2, opacity: 0.75,
    }).addTo(map);

    const posIcon = L.divIcon({
      className: '', html: '<div class="live-dot"></div>',
      iconSize: [14, 14], iconAnchor: [7, 7],
    });
    const posMarker = L.marker([39.5, -98.35], { icon: posIcon }).addTo(map);

    // ── State ──────────────────────────────────────────────────────────
    let lastLat = null, lastLon = null;

    // ── Render ─────────────────────────────────────────────────────────
    function render(d) {
      const stale = d.stale;

      // Speed
      const numEl = document.getElementById('speed-num');
      if (stale || d.speed_mph === null) {
        numEl.textContent = '---';
        numEl.classList.add('stale');
      } else {
        numEl.textContent = Math.round(d.speed_mph);
        numEl.classList.remove('stale');
      }

      // Heading
      document.getElementById('heading-val').textContent = d.heading || '---';

      // Clock
      document.getElementById('clock-time').textContent = d.local_time  || '--:-- --';
      document.getElementById('clock-tz').textContent   = d.local_timezone || '---';

      // Weather
      if (d.weather_temp_f !== null) {
        document.getElementById('wx-temp').textContent = d.weather_temp_f + '°F';
        document.getElementById('wx-desc').textContent = d.weather_desc || '---';
        document.getElementById('wx-icon').src =
          'https://openweathermap.org/img/wn/' + (d.weather_icon || '01d') + '@2x.png';
      }

      // Location
      document.getElementById('loc-val').textContent =
        (d.city_state || '---').toUpperCase();

      // Stale badge
      document.getElementById('stale-badge').classList.toggle('show', !!stale);

      // Map — only pan when position actually changes
      if (d.lat && d.lon) {
        if (d.lat !== lastLat || d.lon !== lastLon) {
          posMarker.setLatLng([d.lat, d.lon]);
          map.panTo([d.lat, d.lon], { animate: true, duration: 1 });
          lastLat = d.lat; lastLon = d.lon;
        }
        // Show last 200 points on the mini-map to keep it readable
        if (d.route && d.route.length > 0) {
          const tail = d.route.slice(-200);
          routeLine.setLatLngs(tail);
        }
      }
    }

    // ── Poll ───────────────────────────────────────────────────────────
    async function poll() {
      try {
        const r = await fetch('/api/status');
        if (r.ok) render(await r.json());
      } catch (e) {
        console.warn('poll error', e);
        // show stale if server unreachable
        document.getElementById('stale-badge').classList.add('show');
      }
      setTimeout(poll, 5000);
    }

    poll();
  </script>
</body>
</html>
